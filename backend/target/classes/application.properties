# Application Configuration
spring.application.name=instagram-analytics-dashboard
server.port=8080

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/instagram_analytics
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=60000

# Session Configuration
spring.session.store-type=redis
spring.session.redis.namespace=instagram-analytics:session

# JWT Configuration
jwt.secret=your-secret-key-change-this-in-production-min-256-bits
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# OAuth2 Google Configuration
spring.security.oauth2.client.registration.google.client-id=your-google-client-id
spring.security.oauth2.client.registration.google.client-secret=your-google-client-secret
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/api/auth/google/callback

# Logging Configuration
logging.level.root=INFO
logging.level.com.socialmedia=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Logging Pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Log File Configuration
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=30

# Async Configuration
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=async-executor-

# CORS Configuration
cors.allowed-origins=http://localhost:5173,http://localhost:3000
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# WebSocket Configuration
websocket.allowed-origins=http://localhost:5173,http://localhost:3000

# Monitoring Scheduler Configuration
monitoring.scheduler.interval=900000
monitoring.scheduler.max-concurrent=5

# Scraping Configuration
scraping.retry.max-attempts=3
scraping.retry.backoff.initial=5000
scraping.retry.backoff.multiplier=2

# Graph API Configuration
graph-api.base-url=https://graph.instagram.com
graph-api.retry.max-attempts=3

# Instagram Graph API Credentials
# Get these from: https://developers.facebook.com/apps
instagram.graph-api.app-id=${INSTAGRAM_APP_ID:}
instagram.graph-api.app-secret=${INSTAGRAM_APP_SECRET:}

# Export Configuration
export.s3.bucket-name=instagram-analytics-exports
export.s3.region=us-east-1
export.presigned-url.expiration=86400

# Notification Configuration
notification.threshold.min=0
notification.threshold.max=1000

# Cache Configuration
cache.profile.ttl=300

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.instagram.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.instagram.wait-duration-in-open-state=60000
resilience4j.circuitbreaker.instances.instagram.sliding-window-size=10

# Resilience4j Retry
resilience4j.retry.instances.database.max-attempts=3
resilience4j.retry.instances.database.wait-duration=1000
